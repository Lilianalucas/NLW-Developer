<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NLM Agents</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <img src="./imagems/logo.png" alt="Logo Esports NLW" />
      <button id="themeToggle" class="theme-toggle" aria-label="Alternar tema">
        🌙
      </button>
    </header>

    <main>
      <section>
        <div>
          <h2 class="title">Assistente de Meta</h2>
          <p>Pergunte sobre estratégias, build e dicas para seus jogos!</p>

          <form id="form">
            <div class="form-group">
              <label for="apikey">🔑 API Key do Gemini</label>
              <input
                id="apikey"
                type="password"
                placeholder="Informe sua chave"
                required
              />
            </div>

            <div class="form-group">
              <label for="gameSelect">🎮 Selecione seu Jogo</label>
              <select id="gameSelect">
                <option value="">Escolha um jogo</option>
                <option value="valorant">Valorant</option>
                <option value="lol">Legend of Legends</option>
                <option value="csgo">CS:GO</option>
              </select>
            </div>

            <div class="form-group full-width">
              <label for="questionInput">❓ Sua Pergunta</label>
              <input
                id="questionInput"
                type="text"
                placeholder="Ex: Melhor build para ADC..."
              />
            </div>
            <button id="askButton" type="button" class="btn-perguntar">
              Perguntar
            </button>
          </form>

          <div id="aiResponse" class="hidden">
            <div class="response-content"></div>
          </div>
        </div>
      </section>
    </main>
    <footer>
      <p>💜✨Desenvolvido com AI e | NLW Agents 2026</p>
    </footer>
    <script src="https://unpkg.com/showdown/dist/showdown.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
